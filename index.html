<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="icon.ico" type="image/png" />
  <title>Exceptiongenda</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Exceptiongenda</h1>

      <div class="header-row">
        <div class="field">
          <label for="referenceDate">Data de referência</label>
          <input type="date" id="referenceDate" />
        </div>

        <button class="danger-button header-clear-button" id="clearAllButton" type="button">
          Limpar não fixados
        </button>

        <button class="secondary-button" id="viewHistoryButton" type="button">
          Ver histórico
        </button>
      </div>

      <div class="week-info" id="weekInfo"></div>
    </header>

    <main>
      <section class="week-grid" id="weekGrid"></section>
    </main>

    <footer class="footer-actions">
      <div class="signature">Feito por ExceptionError</div>
    </footer>
  </div>

  <div class="modal-backdrop hidden" id="historyModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Histórico semanal</h2>
        <button class="icon-button modal-close" id="closeHistoryModal" type="button">×</button>
      </div>

      <div class="modal-body">
        <div class="history-layout">
          <div class="history-sidebar">
            <h3>Semanas salvas</h3>
            <div class="history-dates" id="historyWeeksList"></div>
          </div>

          <div class="history-content">
            <div class="history-selected-date" id="historySelectedWeek">
              Selecione uma semana para visualizar os eventos.
            </div>
            <div class="history-preview" id="historyPreview"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
